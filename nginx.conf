# /etc/nginx/sites-available/pillmate
#
# Nginx reverse proxy for PillMate on EC2.
#
# Landing page  → port 3001  (served at the root domain / IP)
# PillMate app  → port 3000  (served at /app  OR  app.yourdomain.com)
#
# OPTION A — Single IP, path-based (simplest, no domain needed):
#   http://<EC2-IP>/       → landing page
#   http://<EC2-IP>/app    → PillMate app (proxied, strips /app prefix)
#
# OPTION B — Subdomain-based (requires a domain):
#   http://yourdomain.com        → landing page
#   http://app.yourdomain.com    → PillMate app
#
# Uncomment whichever option fits your setup.

# ─────────────────────────────────────────────────────────
# OPTION A: Single IP / path-based routing
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;   # matches any hostname / bare IP

    # Landing page (root)
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # PillMate app at /app  — strips the /app prefix before forwarding
    location /app {
        rewrite ^/app(/.*)$ $1 break;
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─────────────────────────────────────────────────────────
# OPTION B: Subdomain-based routing (comment out OPTION A above)
# Replace yourdomain.com with your actual domain.
